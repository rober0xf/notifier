basePath: /
definitions:
  dto.CreatePaymentRequest:
    properties:
      amount:
        example: 14.99
        type: number
      category:
        allOf:
        - $ref: '#/definitions/entity.CategoryType'
        enum:
        - electronics
        - entertainment
        - education
        - clothing
        - work
        - sports
        example: work
      date:
        example: "2026-04-19"
        type: string
      due_date:
        example: "2026-04-25"
        type: string
      frequency:
        allOf:
        - $ref: '#/definitions/entity.FrequencyType'
        enum:
        - daily
        - weekly
        - montly
        - yearly
        example: montly
      name:
        example: claude
        maxLength: 100
        minLength: 3
        type: string
      paid:
        example: false
        type: boolean
      paid_at:
        example: "2026-04-19"
        type: string
      receipt_url:
        example: https://s3.amazonaws.com/receipts/abc123.pdf
        type: string
      recurrent:
        example: true
        type: boolean
      type:
        allOf:
        - $ref: '#/definitions/entity.TransactionType'
        enum:
        - income
        - expense
        - subscription
        example: subscription
    required:
    - amount
    - category
    - date
    - name
    - type
    type: object
  dto.ErrorResponse:
    properties:
      error:
        example: error message
        type: string
    type: object
  dto.GoogleLoginRequest:
    properties:
      id_token:
        example: eyGaksdjaldasdj...
        type: string
    required:
    - id_token
    type: object
  dto.LoginPayload:
    properties:
      email:
        example: rober@example.com
        maxLength: 254
        type: string
      password:
        example: secret123#!
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      email:
        example: rober@example.com
        type: string
      id:
        example: 1
        type: integer
    type: object
  dto.MeResponse:
    properties:
      email:
        example: rober@example.com
        type: string
      role:
        example: user
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.PaymentResponse:
    properties:
      amount:
        example: 14.99
        type: number
      category:
        allOf:
        - $ref: '#/definitions/entity.CategoryType'
        enum:
        - electronics
        - entertainment
        - education
        - clothing
        - work
        - sports
        example: work
      date:
        example: "2026-04-19"
        type: string
      due_date:
        example: "2026-04-25"
        type: string
      frequency:
        allOf:
        - $ref: '#/definitions/entity.FrequencyType'
        enum:
        - daily
        - weekly
        - montly
        - yearly
        example: montly
      id:
        example: 7
        type: integer
      name:
        example: claude
        type: string
      paid:
        example: false
        type: boolean
      paid_at:
        example: "2026-04-19"
        type: string
      receipt_url:
        example: https://s3.amazonaws.com/receipts/abc123.pdf
        type: string
      recurrent:
        example: true
        type: boolean
      type:
        allOf:
        - $ref: '#/definitions/entity.TransactionType'
        enum:
        - income
        - expense
        - subscription
    type: object
  dto.PaymentValidationErrorResponse:
    properties:
      error:
        example: invalid category
        type: string
      meta:
        $ref: '#/definitions/dto.ValidationMeta'
    type: object
  dto.RegisterPayload:
    properties:
      email:
        example: rober@example.com
        maxLength: 254
        type: string
      password:
        example: secret123#!
        maxLength: 72
        minLength: 8
        type: string
      username:
        example: rober
        maxLength: 32
        minLength: 4
        type: string
    required:
    - email
    - password
    - username
    type: object
  dto.UpdatePaymentRequest:
    properties:
      amount:
        type: number
      category:
        $ref: '#/definitions/entity.CategoryType'
      date:
        type: string
      due_date:
        type: string
      frequency:
        $ref: '#/definitions/entity.FrequencyType'
      name:
        type: string
      paid:
        type: boolean
      paid_at:
        type: string
      receipt_url:
        type: string
      recurrent:
        type: boolean
      type:
        $ref: '#/definitions/entity.TransactionType'
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        example: rober@example.com
        type: string
      password:
        example: newpassword123#!
        type: string
      username:
        example: rober
        type: string
    type: object
  dto.UserCreatedResponse:
    properties:
      message:
        example: check your email to verify your account
        type: string
      user:
        $ref: '#/definitions/dto.UserPayload'
    type: object
  dto.UserPayload:
    properties:
      active:
        example: false
        type: boolean
      email:
        example: rober@example.com
        type: string
      id:
        example: 1
        type: integer
      username:
        example: rober
        type: string
    type: object
  dto.UserValidationErrorResponse:
    properties:
      error:
        example: invalid email domain
        type: string
      suggestion:
        example: did you mean @gmail.com?
        type: string
    type: object
  dto.ValidationMeta:
    properties:
      allowed_categories:
        example:
        - electronics
        - entertainment
        - education
        - clothing
        - work
        - sports
        items:
          $ref: '#/definitions/entity.CategoryType'
        type: array
      allowed_frequencies:
        example:
        - daily
        - weekly
        - monthly
        - yearly
        items:
          $ref: '#/definitions/entity.FrequencyType'
        type: array
      allowed_types:
        example:
        - expense
        - income
        - subscription
        items:
          $ref: '#/definitions/entity.TransactionType'
        type: array
    type: object
  dto.VerifyEmailResponse:
    properties:
      message:
        example: email verified successfully
        type: string
    type: object
  entity.CategoryType:
    enum:
    - electronics
    - entertainment
    - education
    - clothing
    - work
    - sports
    type: string
    x-enum-varnames:
    - CategoryTypeElectronics
    - CategoryTypeEntertainment
    - CategoryTypeEducation
    - CategoryTypeClothing
    - CategoryTypeWork
    - CategoryTypeSports
  entity.FrequencyType:
    enum:
    - daily
    - weekly
    - monthly
    - yearly
    type: string
    x-enum-varnames:
    - FrequencyTypeDaily
    - FrequencyTypeWeekly
    - FrequencyTypeMonthly
    - FrequencyTypeYearly
  entity.TransactionType:
    enum:
    - expense
    - income
    - subscription
    type: string
    x-enum-varnames:
    - TransactionTypeExpense
    - TransactionTypeIncome
    - TransactionTypeSubscription
host: localhost:3000
info:
  contact: {}
  description: Notifier API
  title: Notifier API
  version: "1.0"
paths:
  /v1/admin/payments:
    get:
      description: Returns all payments. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PaymentResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all payments
      tags:
      - payments
  /v1/admin/payments/{id}:
    get:
      description: Returns a single payment by ID. Users can only access their own
        payments.
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaymentResponse'
        "400":
          description: Invalid payment ID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Payment not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get payment by ID
      tags:
      - payments
  /v1/admin/users:
    get:
      description: Returns all users. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserPayload'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all users
      tags:
      - users
  /v1/admin/users/{id}:
    delete:
      description: |-
        Deletes a user account by ID.
        Possible 400 errors: invalid id, invalid user data.
        Possible 401 errors: userID not in context, role not in context.
        Possible 403 errors: cannot delete another user's account.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "400":
          description: Invalid id or user data
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete a user
      tags:
      - users
    get:
      description: Returns a single user by their ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserPayload'
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
  /v1/admin/users/email/{email}:
    get:
      description: Returns a single user by their email.
      parameters:
      - description: User email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserPayload'
        "400":
          description: Invalid email format
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by email
      tags:
      - users
  /v1/auth/payments:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new payment for the authenticated user.
        Possible 400 errors: invalid category, invalid transaction type, invalid frequency, frequency required if recurrent is set, recurrent required if frequency is set, paid required if paid_at is set, due_date cannot be before payment date.
        Possible 401 errors: missing or invalid user ID in context.
        Possible 409 errors: payment already exists.
      parameters:
      - description: Payment creation payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Payment created successfully
          schema:
            $ref: '#/definitions/dto.PaymentResponse'
        "400":
          description: Validation or domain error
          schema:
            $ref: '#/definitions/dto.PaymentValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Payment already exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new payment
      tags:
      - payments
  /v1/auth/payments/{id}:
    delete:
      description: Deletes a payment by ID. Admins can delete any payment, regular
        users can only delete their own.
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "400":
          description: Invalid payment ID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Payment not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a payment
      tags:
      - payments
    put:
      consumes:
      - application/json
      description: Updates a payment by ID. Users can only update their own payments.
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePaymentRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "400":
          description: Validation error or invalid id
          schema:
            $ref: '#/definitions/dto.PaymentValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Payment not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a payment
      tags:
      - payments
  /v1/auth/payments/me:
    get:
      description: Returns all payments for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PaymentResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my payments
      tags:
      - payments
  /v1/auth/users/{id}:
    put:
      consumes:
      - application/json
      description: |-
        Updates a user's data by ID. At least one field is required.
        Possible 400 errors: invalid id, invalid email format, invalid password, missing fields.
        Possible 409 errors: email already in use, username already in use.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserPayload'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a user
      tags:
      - users
  /v1/auth/users/me:
    get:
      description: Returns the authenticated user's data from the JWT context.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /v1/users/email_verification/{token}:
    get:
      description: |-
        Verifies a user's email address using the token sent to their mail.
        Possible 422 errors: invalid or expired verification token.
      parameters:
      - description: Verification token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.VerifyEmailResponse'
        "422":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Verify user email
      tags:
      - users
  /v1/users/login:
    post:
      consumes:
      - application/json
      description: |-
        Authenticates a user and sets a session cookie.
        Possible 401 errors: invalid credentials.
        Possible 403 errors: email not verified.
      parameters:
      - description: Login credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Missing fields
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Email not verified
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login
      tags:
      - auth
  /v1/users/login/google:
    post:
      consumes:
      - application/json
      description: |-
        Authenticates a user using a Google ID token.
        Possible 400 errors: invalid google ID, invalid email format.
        Possible 409 errors: google account already linked to another account.
      parameters:
      - description: Google ID token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Invalid user data
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Invalid google token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Google account already linked
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Google OAuth login
      tags:
      - auth
  /v1/users/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new user account and sends a verification email.
        Possible 400 errors: invalid email format, invalid domain, disposable email, email not reachable, weak password, missing fields.
        Possible 409 errors: email already in use, username already in use.
      parameters:
      - description: Registration data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserCreatedResponse'
        "400":
          description: Validation or domain error
          schema:
            $ref: '#/definitions/dto.UserValidationErrorResponse'
        "409":
          description: 'Conflict: email or username already exists'
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
